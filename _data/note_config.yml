# Note 配置文件
# 控制哪些笔记文件和主题目录在页面展示

# 主题分类说明：
# - 只有在 _data/note_categories.yml 中定义了说明的主题才会显示
# - 未定义的主题会被自动跳过，不会在页面展示
# - 如需添加新主题，请先在 note_categories.yml 中添加定义

# 隐藏的笔记文件列表（相对于 note 目录的路径）
# 示例：
# - scheduler/k8s-scheduler-vs-volcano.md
# - kubernetes/some-draft-note.md
hidden_notes:
  # - scheduler/k8s-scheduler-vs-volcano.md  # 示例：取消注释以隐藏此文件 
  # - scheduler/Optimization_of_Cloud_Computing_Resource_Utilization_Based_on_Hotspot_Scheduling_and_Resource_Oversubscription.md

# 隐藏的主题列表（整个主题目录不展示）
hidden_topics:
  # - some-topic  # 示例：取消注释以隐藏整个主题

# 草稿标记（包含这些关键词的文件将被标记为草稿）
draft_keywords:
  - draft
  - wip
  - work-in-progress
  - temp
  - todo
