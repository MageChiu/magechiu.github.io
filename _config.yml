title: Peng Zhao Tech Notes
description: 面向 GitHub Pages 的技术博客，聚焦云原生、工程实践与个人技术笔记。
url: "https://magechiu.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai
permalink: pretty
markdown: kramdown
highlighter: rouge
homepage_note_directory: kubernetes
collections:
  publications:
    output: true
    permalink: /publication/:path/

publication_category:
  orchestration:
    title: Orchestration Papers
    description: 容器编排、控制平面与集群管理相关论文。
  scheduling:
    title: Scheduling Papers
    description: 资源分配、并发控制与调度器设计相关论文。
  infrastructure:
    title: Infrastructure Papers
    description: 数据中心、平台工程与系统架构背景论文。
  ai-systems:
    title: AI Systems Papers
    description: 大模型系统、分布式训练与自动并行方向论文。
  local-files:
    title: Local Paper Files
    description: 站点中归档保存的本地论文与研究资料。
plugins:
  - jekyll-feed
email: charles.r.chiu@outlook.com

profile:
  subtitle: 平台工程 / 云原生 / AI 工程化
  avatar: /configs/DSC04369.jpg
  intro: 持续记录 Kubernetes、工程效率、平台能力建设与个人技术实践。
  location: Shanghai, China

author:
  name: Peng Zhao
  github: MageChiu

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: ""
      type: "publications"
    values:
      layout: publication
  - scope:
      path: "note"
    values:
      layout: note
  - scope:
      path: "note"
      type: "pages"
    values:
      is_note: true

exclude:
  - README.txt
  - LICENSE.txt
  - .gitignore
  - internal
