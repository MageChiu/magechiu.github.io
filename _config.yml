title: Peng Zhao Tech Notes
description: 面向 GitHub Pages 的技术博客，聚焦云原生、工程实践与个人技术笔记。
url: "https://magechiu.github.io"
baseurl: ""
lang: zh-CN
timezone: Asia/Shanghai
permalink: pretty
markdown: kramdown
highlighter: rouge
homepage_note_directory: kubernetes
plugins:
  - jekyll-feed
email: charles.r.chiu@outlook.com

profile:
  subtitle: 平台工程 / 云原生 / AI 工程化
  avatar: /resources/images/operator-cover.jpg
  intro: 持续记录 Kubernetes、工程效率、平台能力建设与个人技术实践。
  location: Shanghai, China

author:
  name: Peng Zhao
  github: MageChiu

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false

defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
  - scope:
      path: "note"
    values:
      layout: note
  - scope:
      path: "note"
      type: "pages"
    values:
      is_note: true

exclude:
  - README.txt
  - LICENSE.txt
  - .gitignore
  - internal
