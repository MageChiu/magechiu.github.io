<header class="site-header">
  <div class="container site-header__inner">
    <a class="site-brand" href="{{ '/' | relative_url }}">
      <span class="site-brand__title">{{ site.title }}</span>
      <span class="site-brand__subtitle">{{ site.description }}</span>
    </a>

    <nav class="site-nav" aria-label="主导航">
      {% for item in site.data.navigation %}
        <a href="{% if item.external %}{{ item.url }}{% else %}{{ item.url | relative_url }}{% endif %}" {% if item.external %}target="_blank" rel="noreferrer"{% endif %}>{{ item.title }}</a>
      {% endfor %}
    </nav>
  </div>
</header>
